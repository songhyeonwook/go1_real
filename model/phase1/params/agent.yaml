seed: 1
device: cuda:0
num_steps_per_env: 24
max_iterations: 6000
empirical_normalization: {}
obs_groups:
  policy:
  - policy
  - privileged_obs
  critic:
  - policy
  - privileged_obs
clip_actions: null
check_for_nan: true
save_interval: 100
experiment_name: unitree_go1_rough_healthy
run_name: faithful_p1_seed1
logger: tensorboard
neptune_project: isaaclab
wandb_project: isaaclab
resume: false
load_run: .*
load_checkpoint: model_.*.pt
class_name: OnPolicyRunner
actor: {}
critic: {}
algorithm:
  class_name: PPO
  num_learning_epochs: 5
  num_mini_batches: 4
  learning_rate: 0.001
  schedule: adaptive
  gamma: 0.99
  lam: 0.95
  entropy_coef: 0.005
  desired_kl: 0.01
  max_grad_norm: 1.0
  optimizer: adam
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  clip_param: 0.2
  normalize_advantage_per_mini_batch: false
  share_cnn_encoders: false
  rnd_cfg: null
  symmetry_cfg:
    use_data_augmentation: true
    use_mirror_loss: false
    data_augmentation_func: go1_lab.tasks.manager_based.go1_lab.mdp.mirror:compute_symmetric_states
    mirror_loss_coeff: 0.0
policy:
  class_name: ActorCritic
  init_noise_std: 1.0
  noise_std_type: scalar
  state_dependent_std: false
  actor_obs_normalization: false
  critic_obs_normalization: false
  actor_hidden_dims:
  - 512
  - 256
  - 128
  critic_hidden_dims:
  - 512
  - 256
  - 128
  activation: elu
